name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Linux: build .deb and .rpm ──────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Checkout OpenDSPF
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/OpenDSPF
          path: OpenDSPF

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flex bison g++ \
            unixodbc-dev \
            ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - name: Build
        run: make PREFIX=/usr

      - name: Build OpenDSPF
        run: make -C OpenDSPF

      - name: Stage install
        run: sudo make install PREFIX=/usr DESTDIR=/tmp/rpgc-root

      - name: Stage OpenDSPF install
        run: sudo make -C OpenDSPF install PREFIX=/usr DESTDIR=/tmp/dspfc-root

      - name: Package .deb
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          fpm -s dir -t deb \
              -n rpgc -v "$VERSION" \
              --description "RPG IV compiler — run RPG programs on Linux without IBM i" \
              --url "https://github.com/${{ github.repository }}" \
              --maintainer "${{ github.repository_owner }}" \
              --license MIT \
              --depends unixodbc \
              --depends unixodbc-dev \
              -C /tmp/rpgc-root \
              usr/

      - name: Package .rpm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          fpm -s dir -t rpm \
              -n rpgc -v "$VERSION" \
              --description "RPG IV compiler — run RPG programs on Linux without IBM i" \
              --url "https://github.com/${{ github.repository }}" \
              --maintainer "${{ github.repository_owner }}" \
              --license MIT \
              --depends unixODBC \
              --depends unixODBC-devel \
              -C /tmp/rpgc-root \
              usr/

      - name: Package dspfc .deb
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          fpm -s dir -t deb \
              -n dspfc -v "$VERSION" \
              --description "Display file compiler for OpenRPG interactive screen programs" \
              --url "https://github.com/${{ github.repository }}" \
              --maintainer "${{ github.repository_owner }}" \
              --license MIT \
              --recommends rpgc \
              -C /tmp/dspfc-root \
              usr/

      - name: Package dspfc .rpm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          fpm -s dir -t rpm \
              -n dspfc -v "$VERSION" \
              --description "Display file compiler for OpenRPG interactive screen programs" \
              --url "https://github.com/${{ github.repository }}" \
              --maintainer "${{ github.repository_owner }}" \
              --license MIT \
              --recommends rpgc \
              -C /tmp/dspfc-root \
              usr/

      - name: Upload packages to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            rpgc_*.deb
            rpgc-*.rpm
            dspfc_*.deb
            dspfc-*.rpm

  # ── macOS: build .dmg ───────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Checkout OpenDSPF
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/OpenDSPF
          path: OpenDSPF

      - name: Install build dependencies
        run: brew install flex bison unixodbc

      - name: Build
        run: make

      - name: Build OpenDSPF
        run: make -C OpenDSPF

      - name: Stage install
        run: sudo make install DESTDIR=/tmp/rpgc-root

      - name: Build .pkg installer
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          # Pre-install script: check for unixodbc
          mkdir -p /tmp/rpgc-scripts
          cat > /tmp/rpgc-scripts/preinstall << 'EOF'
          #!/bin/bash
          if [ ! -f /opt/homebrew/lib/libodbc.dylib ] && [ ! -f /usr/local/lib/libodbc.dylib ]; then
              echo "Error: unixodbc is required. Install with: brew install unixodbc"
              exit 1
          fi
          exit 0
          EOF
          chmod +x /tmp/rpgc-scripts/preinstall

          # Component 1: rpgc (required)
          pkgbuild \
            --root /tmp/rpgc-root \
            --identifier com.rpgc.compiler \
            --version "$VERSION" \
            --install-location / \
            --scripts /tmp/rpgc-scripts \
            /tmp/rpgc-component.pkg

          # Component 2: dspfc (optional)
          sudo make -C OpenDSPF install DESTDIR=/tmp/dspfc-root
          pkgbuild \
            --root /tmp/dspfc-root \
            --identifier com.rpgc.dspfc \
            --version "$VERSION" \
            --install-location / \
            /tmp/dspfc-component.pkg

          # Product archive: rpgc required, dspfc optional
          cat > /tmp/Distribution.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="2">
              <title>OpenRPG $VERSION</title>
              <options customize="allow" require-scripts="false"/>
              <choices-outline>
                  <line choice="com.rpgc.compiler"/>
                  <line choice="com.rpgc.dspfc"/>
              </choices-outline>
              <choice id="com.rpgc.compiler" title="OpenRPG Compiler (rpgc)"
                      description="The RPG IV compiler. Required."
                      visible="true" enabled="false" selected="true">
                  <pkg-ref id="com.rpgc.compiler"/>
              </choice>
              <choice id="com.rpgc.dspfc" title="OpenDSPF Display File Compiler (dspfc)"
                      description="Compiles display file source into descriptors for interactive screen programs."
                      visible="true" enabled="true" selected="false">
                  <pkg-ref id="com.rpgc.dspfc"/>
              </choice>
              <pkg-ref id="com.rpgc.compiler" version="$VERSION">/tmp/rpgc-component.pkg</pkg-ref>
              <pkg-ref id="com.rpgc.dspfc" version="$VERSION">/tmp/dspfc-component.pkg</pkg-ref>
          </installer-gui-script>
          EOF

          productbuild \
            --distribution /tmp/Distribution.xml \
            --package-path /tmp \
            "openrpg-${VERSION}.pkg"

      - name: Upload PKG to release
        uses: softprops/action-gh-release@v3
        with:
          files: openrpg-*.pkg

  # ── Windows: build NSIS installer ──────────────────────────────────────
  build-windows:
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@v6

      - name: Checkout OpenDSPF
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/OpenDSPF
          path: OpenDSPF

      - uses: msys2/setup-msys2@v2.31.1
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            flex
            bison
            make

      - name: Build
        shell: msys2 {0}
        run: make && make -C OpenDSPF

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Stage installer files
        shell: pwsh
        run: |
          Copy-Item rpgc.exe installer\ -ErrorAction Stop
          Copy-Item runtime\*.h installer\ -ErrorAction Stop
          Copy-Item OpenDSPF\dspfc.exe installer\ -ErrorAction Stop
          Copy-Item OpenDSPF\runtime\rpg_dspf_runtime.h installer\ -ErrorAction Stop

      - name: Build installer
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart("v")
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DVERSION=$VERSION installer\openrpg.nsi

      - name: Upload installer
        uses: softprops/action-gh-release@v3
        with:
          files: installer/openrpg-*-windows-x64.exe
