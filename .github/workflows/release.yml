name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Linux: build .deb and .rpm ──────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flex bison g++ \
            unixodbc-dev \
            ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - name: Build
        run: make PREFIX=/usr

      - name: Stage install
        run: sudo make install PREFIX=/usr DESTDIR=/tmp/rpgc-root

      - name: Package .deb
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          fpm -s dir -t deb \
              -n rpgc -v "$VERSION" \
              --description "RPG IV compiler — run RPG programs on Linux without IBM i" \
              --url "https://github.com/${{ github.repository }}" \
              --maintainer "${{ github.repository_owner }}" \
              --license MIT \
              --depends unixodbc \
              -C /tmp/rpgc-root \
              usr/

      - name: Package .rpm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          fpm -s dir -t rpm \
              -n rpgc -v "$VERSION" \
              --description "RPG IV compiler — run RPG programs on Linux without IBM i" \
              --url "https://github.com/${{ github.repository }}" \
              --maintainer "${{ github.repository_owner }}" \
              --license MIT \
              --depends unixODBC \
              -C /tmp/rpgc-root \
              usr/

      - name: Upload packages to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rpgc_*.deb
            rpgc-*.rpm

  # ── macOS: build .dmg ───────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: brew install flex bison unixodbc

      - name: Build
        run: make

      - name: Stage install
        run: sudo make install DESTDIR=/tmp/rpgc-root

      - name: Build .pkg installer
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p /tmp/rpgc-scripts
          cat > /tmp/rpgc-scripts/preinstall << 'EOF'
          #!/bin/bash
          if [ ! -f /opt/homebrew/lib/libodbc.dylib ] && [ ! -f /usr/local/lib/libodbc.dylib ]; then
              echo "Error: unixodbc is required but not installed."
              echo "Install it with: brew install unixodbc"
              exit 1
          fi
          exit 0
          EOF
          chmod +x /tmp/rpgc-scripts/preinstall
          pkgbuild \
            --root /tmp/rpgc-root \
            --identifier com.rpgc.compiler \
            --version "$VERSION" \
            --install-location / \
            --scripts /tmp/rpgc-scripts \
            "rpgc-${VERSION}.pkg"

      - name: Upload PKG to release
        uses: softprops/action-gh-release@v2
        with:
          files: rpgc-*.pkg

  # ── Windows: build NSIS installer ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            flex
            bison
            make

      - name: Build
        shell: msys2 {0}
        run: make

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Stage installer files
        shell: pwsh
        run: |
          Copy-Item rpgc.exe installer\
          Copy-Item runtime\rpg_runtime.h installer\
          Copy-Item runtime\rpg_sql_runtime.h installer\
          Copy-Item runtime\rpg_xml_runtime.h installer\

      - name: Build installer
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart("v")
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DVERSION=$VERSION installer\openrpg.nsi

      - name: Upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: installer/openrpg-*-windows-x64.exe
