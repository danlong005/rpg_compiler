name: Smoke Test

# Runs after a release is published to verify the packaged binaries
# work correctly against the full test suite.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read

# Only run if the release workflow succeeded
jobs:
  check:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Get release tag
        id: get-tag
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          # workflow_run head_branch is the tag name for tag-triggered runs
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

  # ── macOS .pkg ───────────────────────────────────────────────────────────
  smoke-macos:
    name: macOS (.pkg)
    runs-on: macos-latest
    needs: check
    if: false  # temporarily disabled


    steps:
      - uses: actions/checkout@v4

      - name: Install ODBC dependencies
        timeout-minutes: 10
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install unixodbc sqliteodbc

      - name: Download release package
        timeout-minutes: 5
        run: gh release download "${{ needs.check.outputs.tag }}" --pattern "rpgc-*.pkg"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install package
        timeout-minutes: 5
        run: |
          xattr -cr rpgc-*.pkg
          sudo installer -pkg rpgc-*.pkg -target /

      - name: Run tests
        timeout-minutes: 20
        env:
          ODBCSYSINI: /opt/homebrew/etc
        run: |
          RPGC=rpgc \
          RUNTIME_DIR=/usr/local/share/rpgc/runtime \
          ODBC_FLAGS="-I/opt/homebrew/include -L/opt/homebrew/lib -lodbc" \
          bash tests/run_tests.sh

  # ── Linux .deb ───────────────────────────────────────────────────────────
  smoke-deb:
    name: Linux (.deb)
    runs-on: ubuntu-latest
    needs: check


    steps:
      - uses: actions/checkout@v4

      - name: Install ODBC dependencies
        run: sudo apt-get install -y unixodbc unixodbc-dev libsqliteodbc

      - name: Download release package
        run: gh release download "${{ needs.check.outputs.tag }}" --pattern "rpgc_*.deb"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install package
        run: sudo dpkg -i rpgc_*.deb

      - name: Run tests
        run: |
          RPGC=rpgc \
          RUNTIME_DIR=/usr/share/rpgc/runtime \
          ODBC_FLAGS="-lodbc" \
          bash tests/run_tests.sh

  # ── Linux .rpm ───────────────────────────────────────────────────────────
  smoke-rpm:
    name: Linux (.rpm)
    runs-on: ubuntu-latest
    container: fedora:latest
    needs: check


    steps:
      - uses: actions/checkout@v4

      - name: Install ODBC dependencies
        run: |
          dnf install -y unixODBC unixODBC-devel sqliteodbc diffutils gh clang

      - name: Download release package
        run: gh release download "${{ needs.check.outputs.tag }}" --repo "${{ github.repository }}" --pattern "rpgc-*.rpm"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install package
        run: dnf install -y ./rpgc-*.rpm

      - name: Run tests
        run: |
          RPGC=rpgc \
          RUNTIME_DIR=/usr/share/rpgc/runtime \
          ODBC_FLAGS="-lodbc" \
          CXX=clang++ \
          bash tests/run_tests.sh

  # ── Windows .exe ─────────────────────────────────────────────────────────
  smoke-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    needs: check

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc diffutils

      - name: Install SQLite ODBC driver
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.ch-werner.de/sqliteodbc/sqliteodbc_w64.exe" -OutFile "$env:TEMP\sqliteodbc_w64.exe" -SkipCertificateCheck
          Start-Process -Wait -FilePath "$env:TEMP\sqliteodbc_w64.exe" -ArgumentList "/S"
          # The installer registers as "SQLite3 ODBC Driver"; add alias "SQLite3" so
          # connection strings using Driver={SQLite3} work
          $driverKey = "HKLM:\SOFTWARE\ODBC\ODBCINST.INI\SQLite3 ODBC Driver"
          $dllPath   = (Get-ItemProperty -Path $driverKey -Name Driver).Driver
          New-Item -Path "HKLM:\SOFTWARE\ODBC\ODBCINST.INI\SQLite3" -Force | Out-Null
          New-ItemProperty -Path "HKLM:\SOFTWARE\ODBC\ODBCINST.INI\SQLite3" -Name Driver -Value $dllPath -PropertyType String -Force | Out-Null
          New-ItemProperty -Path "HKLM:\SOFTWARE\ODBC\ODBCINST.INI\SQLite3" -Name Setup  -Value $dllPath -PropertyType String -Force | Out-Null
          Set-ItemProperty -Path "HKLM:\SOFTWARE\ODBC\ODBCINST.INI\ODBC Drivers" -Name SQLite3 -Value Installed

      - name: Download release installer
        shell: pwsh
        run: gh release download "${{ needs.check.outputs.tag }}" --pattern "openrpg-*-windows-x64.exe"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install OpenRPG
        shell: pwsh
        run: |
          $exe = Get-Item "openrpg-*-windows-x64.exe"
          # /D overrides install dir — use a space-free path so MSYS2 -I flags work
          Start-Process -Wait -FilePath $exe.FullName -ArgumentList "/S /D=C:\openrpg"

      - name: Run tests
        run: |
          export PATH="/c/openrpg:$PATH"
          RPGC=rpgc \
          RUNTIME_DIR="/c/openrpg/runtime" \
          ODBC_FLAGS="-lodbc32" \
          CXX=g++ \
          bash tests/run_tests.sh
