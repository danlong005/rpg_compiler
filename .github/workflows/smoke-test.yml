name: Smoke Test

# Runs after a release is published to verify the packaged binaries
# work correctly against the full test suite.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:

  # ── macOS .pkg ───────────────────────────────────────────────────────────
  smoke-macos:
    name: macOS (.pkg)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ODBC dependencies
        run: brew install unixodbc sqliteodbc

      - name: Download release package
        run: gh release download "${{ github.ref_name }}" --pattern "rpgc-*.pkg"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install package
        run: |
          xattr -cr rpgc-*.pkg
          sudo installer -pkg rpgc-*.pkg -target /

      - name: Run tests
        run: |
          RPGC=rpgc \
          RUNTIME_DIR=/usr/local/share/rpgc/runtime \
          ODBC_FLAGS="-I/opt/homebrew/include -L/opt/homebrew/lib -lodbc" \
          bash tests/run_tests.sh

  # ── Linux .deb ───────────────────────────────────────────────────────────
  smoke-deb:
    name: Linux (.deb)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ODBC dependencies
        run: sudo apt-get install -y unixodbc libsqliteodbc

      - name: Download release package
        run: gh release download "${{ github.ref_name }}" --pattern "rpgc_*.deb"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install package
        run: sudo dpkg -i rpgc_*.deb

      - name: Run tests
        run: |
          RPGC=rpgc \
          RUNTIME_DIR=/usr/share/rpgc/runtime \
          ODBC_FLAGS="-lodbc" \
          bash tests/run_tests.sh

  # ── Linux .rpm ───────────────────────────────────────────────────────────
  smoke-rpm:
    name: Linux (.rpm)
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ODBC dependencies
        run: |
          dnf install -y unixODBC libsqliteodbc gh clang

      - name: Download release package
        run: gh release download "${{ github.ref_name }}" --pattern "rpgc-*.rpm"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install package
        run: rpm -i rpgc-*.rpm

      - name: Run tests
        run: |
          RPGC=rpgc \
          RUNTIME_DIR=/usr/share/rpgc/runtime \
          ODBC_FLAGS="-lodbc" \
          CXX=clang++ \
          bash tests/run_tests.sh

  # ── Windows .exe ─────────────────────────────────────────────────────────
  smoke-windows:
    name: Windows (.exe)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Install SQLite ODBC driver
        shell: pwsh
        run: choco install sqliteodbc --no-progress -y

      - name: Download release installer
        shell: pwsh
        run: gh release download "${{ github.ref_name }}" --pattern "openrpg-*-windows-x64.exe"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install OpenRPG
        shell: pwsh
        run: |
          $exe = Get-Item "openrpg-*-windows-x64.exe"
          Start-Process -Wait -FilePath $exe.FullName -ArgumentList "/S"

      - name: Run tests
        run: |
          export PATH="/c/Program Files/openrpg:$PATH"
          RPGC=rpgc \
          RUNTIME_DIR="/c/Program Files/openrpg/runtime" \
          ODBC_FLAGS="-lodbc32" \
          CXX=g++ \
          bash tests/run_tests.sh
