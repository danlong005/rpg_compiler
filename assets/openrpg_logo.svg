<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>OpenRPG punch card logo with Hollerith encoding</title>
  <desc>A punch card logo for OpenRPG with OPENRPG encoded in real Hollerith punch card format</desc>
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .card-bg { fill: #e8e0cc; }
        .card-stroke { stroke: #c8b99a; }
        .hole { fill: #1a1a1a; }
        .hole-empty { fill: none; stroke: #c8b99a; stroke-width: 0.5; }
        .notch { fill: #c8b99a; }
        .card-text { fill: #2a1f0a; }
        .card-text-muted { fill: #6b5a3a; }
        .col-label { fill: #8a7050; }
        .wordmark { fill: #e8e0cc; }
        .tagline { fill: #a09080; }
        .rule { stroke: #c8b99a; }
      }
      @media (prefers-color-scheme: light) {
        .card-bg { fill: #f5edd8; }
        .card-stroke { stroke: #c8aa70; }
        .hole { fill: #1a1205; }
        .hole-empty { fill: none; stroke: #c8aa70; stroke-width: 0.5; }
